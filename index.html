<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Fitness Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="stack-header">
      <div class="stack-title">
        <h1
          class="fit-text stack-copy stack-copy-title"
          data-fit-text
          data-fit-base="184"
          data-fit-height="118"
        >
          <span class="fit-text-inner">FITNESS QUEST</span>
        </h1>
      </div>
      <button
        id="libraryButton"
        class="header-action"
        type="button"
        aria-label="Open quest library"
      >
        <span id="libraryButtonIcon" class="header-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="4" x2="20" y1="12" y2="12"></line>
            <line x1="4" x2="20" y1="6" y2="6"></line>
            <line x1="4" x2="20" y1="18" y2="18"></line>
          </svg>
        </span>
      </button>
    </header>

    <section class="score-wrap" aria-live="polite" aria-atomic="true">
      <div class="score-card" aria-label="Quest score">
        <span class="visually-hidden">Quest Score</span>
        <strong
          id="scoreValue"
          class="fit-text stack-copy stack-copy-score"
          data-fit-text
          data-fit-base="104"
          data-fit-align="center"
        >
          <span class="fit-text-inner">0</span>
        </strong>
      </div>
    </section>

    <main class="timeline-view">
      <section
        id="timeline"
        class="quest-stack"
        aria-label="Fitness Quest activity timeline"
      ></section>
    </main>

    <button
      id="questButton"
      class="quest-fab"
      type="button"
      aria-label="Start a new quest"
    >
      <span class="quest-action-icon" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M5 12h14"></path>
          <path d="M12 5v14"></path>
        </svg>
      </span>
    </button>

    <div id="questControls" class="quest-controls" aria-label="Quest actions">
      <button
        id="acceptButton"
        class="quest-action quest-action-accept"
        type="button"
        aria-label="Accept quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      </button>
      <button
        id="rerollButton"
        class="quest-action quest-action-reroll"
        type="button"
        aria-label="Reroll quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </span>
      </button>
      <button
        id="rejectButton"
        class="quest-action quest-action-reject"
        type="button"
        aria-label="Reject quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </span>
      </button>
    </div>

    <div
      id="librarySelectionControls"
      class="quest-controls"
      aria-label="Selected library quest actions"
    >
      <button
        id="toggleQuestButton"
        class="quest-action quest-action-toggle"
        type="button"
        aria-label="Set quest inactive"
      >
        <span id="toggleQuestLabel" aria-hidden="true">ON</span>
      </button>
      <button
        id="deleteQuestButton"
        class="quest-action quest-action-delete"
        type="button"
        aria-label="Delete quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" x2="10" y1="11" y2="17"></line>
            <line x1="14" x2="14" y1="11" y2="17"></line>
          </svg>
        </span>
      </button>
      <button
        id="libraryCancelButton"
        class="quest-action quest-action-reject"
        type="button"
        aria-label="Deselect quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </span>
      </button>
    </div>

    <div
      id="libraryCreateControls"
      class="quest-controls"
      aria-label="New library quest actions"
    >
      <button
        id="saveQuestButton"
        class="quest-action quest-action-accept"
        type="button"
        aria-label="Save quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      </button>
      <button
        id="cancelCreateButton"
        class="quest-action quest-action-reject"
        type="button"
        aria-label="Cancel new quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </span>
      </button>
    </div>

    <div id="feedback" class="feedback" aria-live="polite" aria-atomic="true"></div>

    <script src="./script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#de2c23" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FitQuest" />
    <title>Fitness Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double:wght@400&family=Climate+Crisis&family=DynaPuff:wght@700&family=Erica+One&family=Saira+Stencil+One&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="icon" href="./icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="stack-header">
      <div class="stack-title">
        <h1
          class="fit-text stack-copy stack-copy-title"
        >
          <span class="fit-text-inner">FITNESS QUEST</span>
        </h1>
      </div>
      <button
        id="libraryButton"
        class="header-action"
        type="button"
        aria-label="Open settings"
      >
        <span id="libraryButtonIcon" class="header-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12.22 2h-.44a2 2 0 0 0-1.94 1.57l-.26 1.24a1 1 0 0 1-.64.73c-.56.22-1.09.53-1.57.9a1 1 0 0 1-.9.15l-1.2-.48a2 2 0 0 0-2.33.73l-.25.38a2 2 0 0 0 .24 2.45l.96.98a1 1 0 0 1 .25 1.03 8.3 8.3 0 0 0 0 1.82 1 1 0 0 1-.25 1.03l-.96.98a2 2 0 0 0-.24 2.45l.25.38a2 2 0 0 0 2.33.73l1.2-.48a1 1 0 0 1 .9.15c.48.37 1.01.68 1.57.9a1 1 0 0 1 .64.73l.26 1.24a2 2 0 0 0 1.94 1.57h.44a2 2 0 0 0 1.94-1.57l.26-1.24a1 1 0 0 1 .64-.73c.56-.22 1.09-.53 1.57-.9a1 1 0 0 1 .9-.15l1.2.48a2 2 0 0 0 2.33-.73l.25-.38a2 2 0 0 0-.24-2.45l-.96-.98a1 1 0 0 1-.25-1.03 8.3 8.3 0 0 0 0-1.82 1 1 0 0 1 .25-1.03l.96-.98a2 2 0 0 0 .24-2.45l-.25-.38a2 2 0 0 0-2.33-.73l-1.2.48a1 1 0 0 1-.9-.15 7.97 7.97 0 0 0-1.57-.9 1 1 0 0 1-.64-.73l-.26-1.24A2 2 0 0 0 12.22 2z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </span>
      </button>
    </header>

    <section class="score-wrap" aria-live="polite" aria-atomic="true">
      <div class="score-card" aria-label="Quest score">
        <span class="visually-hidden">Quest Score</span>
        <strong
          id="scoreValue"
          class="fit-text stack-copy stack-copy-score"
          data-fit-text
          data-fit-base="104"
          data-fit-align="center"
        >
          <span class="fit-text-inner">0</span>
        </strong>
      </div>
    </section>

    <main class="timeline-view">
      <section
        id="timeline"
        class="quest-stack"
        aria-label="Fitness Quest activity timeline"
      ></section>
    </main>

    <button
      id="questButton"
      class="quest-fab"
      type="button"
      aria-label="Start a new quest"
    >
      <span class="quest-action-icon" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M5 12h14"></path>
          <path d="M12 5v14"></path>
        </svg>
      </span>
    </button>

    <div id="questControls" class="quest-controls" aria-label="Quest actions">
      <button
        id="acceptButton"
        class="quest-action quest-action-accept"
        type="button"
        aria-label="Accept quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      </button>
      <button
        id="rerollButton"
        class="quest-action quest-action-reroll"
        type="button"
        aria-label="Reroll quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </span>
      </button>
      <button
        id="rejectButton"
        class="quest-action quest-action-reject"
        type="button"
        aria-label="Reject quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </span>
      </button>
    </div>

    <div
      id="librarySelectionControls"
      class="quest-controls"
      aria-label="Selected library quest actions"
    >
      <button
        id="toggleQuestButton"
        class="quest-action quest-action-toggle"
        type="button"
        aria-label="Set quest inactive"
      >
        <span id="toggleQuestLabel" aria-hidden="true">ON</span>
      </button>
      <button
        id="editQuestButton"
        class="quest-action quest-action-edit"
        type="button"
        aria-label="Edit quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
          </svg>
        </span>
      </button>
      <button
        id="deleteQuestButton"
        class="quest-action quest-action-delete"
        type="button"
        aria-label="Delete quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" x2="10" y1="11" y2="17"></line>
            <line x1="14" x2="14" y1="11" y2="17"></line>
          </svg>
        </span>
      </button>
      <button
        id="libraryCancelButton"
        class="quest-action quest-action-reject"
        type="button"
        aria-label="Deselect quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </span>
      </button>
    </div>

    <div
      id="libraryCreateControls"
      class="quest-controls"
      aria-label="New library quest actions"
    >
      <button
        id="saveQuestButton"
        class="quest-action quest-action-accept"
        type="button"
        aria-label="Save quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      </button>
      <button
        id="cancelCreateButton"
        class="quest-action quest-action-reject"
        type="button"
        aria-label="Cancel new quest"
      >
        <span class="quest-action-icon" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </span>
      </button>
    </div>

    <footer id="locationPicker" class="location-picker" aria-label="Quest location">
      <button
        id="locationPickerButton"
        class="location-picker-button"
        type="button"
        aria-label="Change quest location"
      >
        <span class="location-picker-viewport" aria-hidden="true">
          <span id="locationPickerLabel" class="location-picker-label">Default</span>
        </span>
      </button>
    </footer>

    <div id="feedback" class="feedback" aria-live="polite" aria-atomic="true"></div>
    <input
      id="importFileInput"
      class="visually-hidden"
      type="file"
      accept="application/json,.json"
      aria-label="Import FitQuest data"
    />

    <script src="./script.js"></script>
    <script async data-id="101502386" src="//static.getclicky.com/js"></script>
  </body>
</html>
